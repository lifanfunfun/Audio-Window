<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Retro background -->
  <rect width="512" height="512" fill="#E8DFC0" />
  
  <!-- Outer Window with black outline -->
  <rect x="24" y="24" width="464" height="464" fill="#38A888" stroke="#000000" stroke-width="16" />
  
  <!-- Title bar -->
  <rect x="24" y="24" width="464" height="48" fill="#000000" />
  <text x="40" y="56" fill="#38A888" font-family="monospace" font-size="24" font-weight="bold">CAMERA.EXE</text>
  <!-- Minimize / Maximize / Close Buttons -->
  <rect x="400" y="34" width="28" height="28" fill="#38A888" stroke="#000000" stroke-width="4" />
  <text x="409" y="54" fill="#000000" font-family="monospace" font-size="20" font-weight="bold">_</text>
  
  <rect x="440" y="34" width="28" height="28" fill="#38A888" stroke="#000000" stroke-width="4" />
  <text x="448" y="55" fill="#000000" font-family="monospace" font-size="20" font-weight="bold">X</text>
  
  <!-- Inner window border -->
  <rect x="48" y="96" width="416" height="368" fill="none" stroke="#000000" stroke-width="8" />
  
  <!-- Pixel art Camera / Wave graphic in the center -->
  <!-- Camera Body -->
  <rect x="156" y="220" width="200" height="130" fill="#E8DFC0" stroke="#000000" stroke-width="12" />
  <!-- Camera Top Flash/Prism -->
  <polygon points="216,220 296,220 276,180 236,180" fill="#E8DFC0" stroke="#000000" stroke-width="12" stroke-linejoin="round" />
  <!-- Lens outer -->
  <circle cx="256" cy="285" r="45" fill="#38A888" stroke="#000000" stroke-width="10" />
  <!-- Lens inner -->
  <circle cx="256" cy="285" r="20" fill="#000000" />
  <!-- Lens reflection -->
  <circle cx="248" cy="277" r="6" fill="#E8DFC0" />
  
  <!-- Sound Waves/Antenna (Theremin aspect) -->
  <path d="M 100,240 Q 80,285 100,330" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round" />
  <path d="M 120,250 Q 105,285 120,320" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" />
  
  <path d="M 412,240 Q 432,285 412,330" fill="none" stroke="#000000" stroke-width="8" stroke-linecap="round" />
  <path d="M 392,250 Q 407,285 392,320" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" />
  
  <!-- Retro grid lines or scanlines -->
  <g opacity="0.15">
    <line x1="24" y1="150" x2="488" y2="150" stroke="#000" stroke-width="2" />
    <line x1="24" y1="200" x2="488" y2="200" stroke="#000" stroke-width="2" />
    <line x1="24" y1="250" x2="488" y2="250" stroke="#000" stroke-width="2" />
    <line x1="24" y1="300" x2="488" y2="300" stroke="#000" stroke-width="2" />
    <line x1="24" y1="350" x2="488" y2="350" stroke="#000" stroke-width="2" />
    <line x1="24" y1="410" x2="488" y2="410" stroke="#000" stroke-width="2" />
  </g>
  
  <!-- LED Indicator -->
  <circle cx="180" cy="250" r="10" fill="#00FF00" stroke="#000000" stroke-width="3" />
</svg>
